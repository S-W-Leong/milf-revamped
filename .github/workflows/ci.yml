name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - UPGRADES

permissions:
  contents: read

jobs:
  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reject tracked local-only files
        shell: bash
        run: |
          tracked="$(git ls-files .env android/local.properties .idea android/.idea)"
          if [ -n "$tracked" ]; then
            echo "Local-only files are tracked:"
            echo "$tracked"
            exit 1
          fi

      - name: Run lightweight secret denylist
        shell: bash
        run: |
          if git grep -nI -E '(-----BEGIN (RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9_]{36,}|github_pat_[A-Za-z0-9_]+|sk-[A-Za-z0-9]{20,})' -- . ':!.env.example'; then
            echo "Potential committed secret matched the denylist."
            exit 1
          fi

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run backend tests
        run: python -m pytest

  android:
    name: Android test and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android tests and debug build
        run: ./gradlew --no-daemon --console=plain :app:testDebugUnitTest :app:assembleDebug
